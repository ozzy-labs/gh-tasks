# go-test-coverage configuration
# https://github.com/vladopajic/go-test-coverage
#
# Per-package coverage gate enforced in CI (see .github/workflows/ci.yaml).
# Thresholds are set at "current measured coverage minus a small safety buffer"
# so the gate passes today and prevents future regression. As coverage rises
# (Issues #257-#263), the corresponding PR should raise the threshold here.

profile: coverage.out

# Global floors applied to anything not matched by an override.
# - file: kept at 0 because we enforce package-level granularity instead;
#   raising this would block heterogeneous files inside otherwise healthy
#   packages and is out of scope for this gate.
# - package: 60 = overall floor for any package not listed in `override`.
# - total: 60 = overall project floor.
threshold:
  file: 0
  package: 60
  total: 60

# Per-package overrides. Path patterns are regexes matched against
# module-relative package paths (e.g. `cmd`, `internal/scope`). Each pattern
# is fully anchored (`^...$`) so prefix-sharing pairs like `internal/github`
# and `internal/github/queries` apply independently — no ordering hazard.
override:
  - path: ^cmd$
    threshold: 68
  - path: ^internal/adapters$
    threshold: 93
  - path: ^internal/config$
    threshold: 84
  # internal/github/queries: with genqlient.go excluded the meaningful
  # number is pagination.go; current 74.3%, floor 72 (current - 2).
  - path: ^internal/github/queries$
    threshold: 72
  - path: ^internal/github$
    threshold: 86
  - path: ^internal/i18ncheck$
    threshold: 79
  - path: ^internal/i18n$
    threshold: 75
  - path: ^internal/period$
    threshold: 87
  - path: ^internal/projectitem$
    threshold: 59
  - path: ^internal/project$
    threshold: 85
  - path: ^internal/repo$
    threshold: 84
  - path: ^internal/scope$
    threshold: 90
  - path: ^internal/skills$
    threshold: 78

# Files/packages excluded from coverage statistics entirely.
# - genqlient.go: auto-generated by Khan/genqlient (DO NOT EDIT). Distorts
#   the queries-package number; once excluded, the meaningful coverage
#   target is hand-written pagination.go.
# - generate.go: only holds //go:generate directives, no runtime statements.
# - main.go: cobra entry point + exit code mapping; tested transitively via
#   the cmd package's RootWithDeps tests. Not meaningful to instrument.
exclude:
  paths:
    - internal/github/queries/genqlient\.go$
    - internal/github/queries/generate\.go$
    - ^main\.go$
