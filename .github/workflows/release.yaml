name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
          generate_attestations: true
          # release_android: false   # default in v2
          # gpg_fingerprint:         # set when an org-level GPG key is wired up

  checksums:
    needs: [release-please, build-binaries]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # cli/gh-extension-precompile@v2 emits release assets named
      # `<goos>-<goarch>` (windows variants gain a `.exe` suffix) plus a
      # generated `manifest.yml`. The legacy `gh-tasks_*` pattern matched
      # nothing under v2 so the checksum file was empty / missing; pull each
      # platform family explicitly instead.
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.release-please.outputs.tag_name }} \
            --pattern 'darwin-*' \
            --pattern 'linux-*' \
            --pattern 'freebsd-*' \
            --pattern 'windows-*' \
            --repo ${{ github.repository }}
      - name: Compute SHA256 checksums
        # `shopt -s nullglob` so a missing platform family expands to nothing
        # rather than the literal pattern (which sha256sum would treat as a
        # missing file and fail on). The `*-*` glob covers every emitted
        # `<goos>-<goarch>[.exe]` asset and intentionally excludes
        # `manifest.yml` / `checksums.txt`.
        shell: bash
        run: |
          shopt -s nullglob
          sha256sum -- *-* > checksums.txt
      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} checksums.txt
