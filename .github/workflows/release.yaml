name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: gh-tasks-linux-amd64
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: gh-tasks-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: gh-tasks-darwin-amd64
          - os: macos-latest
            target: bun-darwin-arm64
            name: gh-tasks-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            name: gh-tasks-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun build packages/gh-tasks/src/cli.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.name }}
        shell: bash
      - run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.name }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
