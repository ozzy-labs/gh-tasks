name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: gh-tasks-linux-amd64
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: gh-tasks-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: gh-tasks-darwin-amd64
          - os: macos-latest
            target: bun-darwin-arm64
            name: gh-tasks-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            name: gh-tasks-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun build packages/gh-tasks/src/cli.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.name }}
        shell: bash
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ matrix.name }}
      - run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.name }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    needs: [release-please, build-binaries]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.release-please.outputs.tag_name }} \
            --pattern 'gh-tasks-*' \
            --repo ${{ github.repository }}
      - name: Compute SHA256 checksums
        run: sha256sum gh-tasks-* > checksums.txt
      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} checksums.txt
