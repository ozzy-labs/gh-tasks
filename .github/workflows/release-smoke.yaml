name: release-smoke

# Validates that the published release artefacts are usable by an end user
# (gh extension install + version + help). Triggered only after the `release`
# workflow finishes so the build-binaries / checksums jobs have actually
# attached the assets — listening to the raw `release: published` event
# would race the precompile step (release-please-action publishes the
# release before binaries are uploaded) and reliably fail the first install
# attempt of every new tag.
on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to smoke-test (defaults to the latest published release)
        required: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    # workflow_run sends `completed` for both success and failure; only run
    # the smoke when the release workflow itself succeeded. workflow_dispatch
    # has no upstream conclusion, so always run on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve target tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            # `release.yaml` runs on every push to main, but only actually
            # publishes when release-please decides a version bump is due.
            # Non-release runs leave the latest-release lookup empty (and on
            # repos with no release ever, gh release view exits non-zero with
            # "release not found"), so swallow the error and skip the rest of
            # the job rather than failing every main-branch CI cycle.
            tag=$(gh release view --json tagName --jq .tagName 2>/dev/null || true)
          fi
          if [ -z "$tag" ]; then
            echo "No release found; skipping smoke."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing tag: $tag"
      - name: Install gh-tasks extension at tag
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install ozzy-labs/gh-tasks --pin "${{ steps.tag.outputs.tag }}"
      - name: Verify version output
        if: steps.tag.outputs.skip != 'true'
        run: |
          out=$(gh tasks --version)
          echo "$out"
          echo "$out" | grep -E "^gh-tasks version v?[0-9]+\.[0-9]+\.[0-9]+"
      - name: Verify help output
        if: steps.tag.outputs.skip != 'true'
        run: gh tasks --help | grep -q "Available Commands"
      - name: Verify subcommand help reaches all major commands
        if: steps.tag.outputs.skip != 'true'
        run: |-
          for cmd in add list today 'done' standup review plan triage link projects; do
            gh tasks "$cmd" --help >/dev/null
          done
      # cli/gh-extension-precompile@v2 emits binaries named `<goos>-<goarch>`
      # (windows variants gain a `.exe` suffix). Confirm the six tier-1
      # platforms users install on are all attached so a partial upload does
      # not silently ship.
      - name: Verify expected platform binaries are attached
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          expected="darwin-amd64 darwin-arm64 linux-amd64 linux-arm64 windows-amd64.exe windows-arm64.exe"
          assets=$(gh release view "${{ steps.tag.outputs.tag }}" --json assets --jq '.assets[].name')
          echo "$assets"
          missing=0
          for plat in $expected; do
            if ! printf '%s\n' "$assets" | grep -Fxq "$plat"; then
              echo "::error::missing release asset: $plat"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      # SLSA build-provenance attestations are produced by
      # `actions/attest-build-provenance` inside precompile@v2 when
      # `generate_attestations: true`. `gh attestation verify` confirms each
      # binary was built by this repo's release workflow.
      - name: Verify SLSA attestations on each platform binary
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tmp=$(mktemp -d)
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern 'darwin-*' \
            --pattern 'linux-*' \
            --pattern 'windows-*' \
            --dir "$tmp"
          shopt -s nullglob
          cd "$tmp"
          count=0
          # `gh attestation verify` calls https://api.github.com/.../attestations
          # per binary; a single TCP timeout (140.82.x i/o timeout, observed
          # 2026-05-08 on v0.2.1 smoke) fails the whole run. Retry up to 3
          # times per binary with linear backoff before giving up.
          for f in *; do
            [ -f "$f" ] || continue
            echo "verifying attestation for $f"
            attempt=1
            until gh attestation verify "$f" --repo "${{ github.repository }}"; do
              if [ "$attempt" -ge 3 ]; then
                echo "::error::attestation verify failed for $f after 3 attempts"
                exit 1
              fi
              sleep_for=$((attempt * 5))
              echo "attempt $attempt failed for $f; retrying in ${sleep_for}s..."
              sleep "$sleep_for"
              attempt=$((attempt + 1))
            done
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "::error::no binaries downloaded for attestation verification"
            exit 1
          fi
      # `release.yaml`'s checksums job uploads `checksums.txt` covering every
      # `gh-tasks_*`-named asset. We re-run the verification client-side to
      # catch corruption / mismatch between checksum file and binaries.
      - name: Verify checksums.txt matches all platform binaries
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |-
          tmp=$(mktemp -d)
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern 'checksums.txt' \
            --pattern 'darwin-*' \
            --pattern 'linux-*' \
            --pattern 'freebsd-*' \
            --pattern 'windows-*' \
            --dir "$tmp"
          if [ ! -f "$tmp/checksums.txt" ]; then
            echo "::error::checksums.txt is missing from the release"
            exit 1
          fi
          cd "$tmp"
          sha256sum -c checksums.txt
