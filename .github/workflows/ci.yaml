name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: markdownlint-cli2 "**/*.md" "#**/node_modules" "#**/dist" "#**/CHANGELOG.md"
      - run: yamllint .

  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required for govulncheck SARIF upload
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go generate drift check
        run: |-
          go generate ./...
          if ! git diff --quiet; then
            echo "::error::go generate produced uncommitted changes" >&2
            git diff --stat
            exit 1
          fi

      - name: go test (race + shuffle)
        run: go test -race -shuffle=on ./...

      - name: go test (coverage profile)
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: per-package coverage gate
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yaml

      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 7

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout 5m

      - name: govulncheck (text, fail-fast)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

      - name: govulncheck (SARIF for Code Scanning)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          output-format: sarif
          output-file: govulncheck.sarif
        continue-on-error: true
      - name: Upload govulncheck SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: govulncheck.sarif
        continue-on-error: true

      - name: hardcoded i18n check
        run: go run . check-i18n

  go-skill-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build-skills (smoke)
        run: go run . build-skills --dist /tmp/dist-smoke
      - name: assert all 4 adapters produced output
        run: |-
          set -euo pipefail
          for adapter in claude-code codex-cli gemini-cli copilot; do
            test -d "/tmp/dist-smoke/${adapter}" || {
              echo "missing dist/${adapter}/" >&2; exit 1;
            }
          done
