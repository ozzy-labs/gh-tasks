name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: markdownlint-cli2 "**/*.md" "#**/node_modules" "#**/dist" "#**/CHANGELOG.md"
      - run: yamllint .

  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required for govulncheck SARIF upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Match the toolchain directive in go.mod (`toolchain go1.26.0`).
          # Reading `go-version-file` picks up only the `go` directive
          # (1.25.0), which then triggers toolchain auto-download for
          # `compile` (1.26.0) — that mix breaks `-coverprofile`
          # instrumentation with "compile version does not match go tool
          # version" errors. Pinning the installed Go to the latest 1.26.x
          # keeps stdlib and toolchain in sync, and `1.26` (no patch)
          # auto-picks the newest patch so govulncheck does not flag stdlib
          # vulnerabilities fixed in subsequent point releases.
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go generate drift check
        run: |-
          go generate ./...
          if ! git diff --quiet; then
            echo "::error::go generate produced uncommitted changes" >&2
            git diff --stat
            exit 1
          fi

      - name: go test (race + shuffle + coverage)
        run: go test -race -shuffle=on -coverprofile=coverage.out -covermode=atomic ./...

      - name: per-package coverage gate
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yaml

      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 7

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout 5m

      - name: govulncheck (text, fail-fast)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'

      - name: govulncheck (SARIF for Code Scanning)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'
          output-format: sarif
          output-file: govulncheck.sarif
        continue-on-error: true
      - name: Upload govulncheck SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: govulncheck.sarif
        continue-on-error: true

      - name: hardcoded i18n check
        run: go run . check-i18n

      - name: i18n catalog reference check
        run: go run . check-i18n --refs

  go-skill-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
      - name: build-skills (smoke)
        run: go run . build-skills --dist /tmp/dist-smoke
      - name: assert all 4 adapters produced output
        run: |-
          set -euo pipefail
          for adapter in claude-code codex-cli gemini-cli copilot; do
            test -d "/tmp/dist-smoke/${adapter}" || {
              echo "missing dist/${adapter}/" >&2; exit 1;
            }
          done
