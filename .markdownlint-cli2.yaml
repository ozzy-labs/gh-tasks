config:
  default: true
  MD013: false # line-length
  MD033: false # inline-html
  MD041: false # first-line-h1
globs:
  - "**/*.md"
ignores:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/CHANGELOG.md"
  # Synced from @ozzylabs/skills via sync-skills.sh; lint upstream not here.
  - ".agents/skills/**"
  - ".claude/skills/**"
