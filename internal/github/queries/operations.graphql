# GraphQL operations consumed by the gh-tasks CLI.
#
# This file is the single source of truth for genqlient-generated typed
# operations. Each operation here is compiled into a Go function in
# `genqlient.go` (see `genqlient.yaml`). Hand-written counterparts in
# `queries.go` are migrated incrementally — see #229 (scaffolding +
# pilot), #230 (read ops, this file), #231 (mutations).

# Pilot operation. Used by `cmd/standup.go` to resolve the authenticated
# user's login when filtering to "@me" without an explicit owner.
query GetViewerLogin {
  viewer {
    login
  }
}

# ===== Issue read operations ================================================

# ListRepoIssues lists open Issues under a repository, ordered by recently
# updated.
query ListRepoIssues($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    issues(first: $first, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
        url
        updatedAt
        author {
          login
        }
        assignees(first: 10) {
          nodes {
            login
          }
        }
      }
    }
  }
}

# GetIssueByNumber resolves an Issue's node id from owner/name + number.
query GetIssueByNumber($owner: String!, $name: String!, $number: Int!) {
  repository(owner: $owner, name: $name) {
    issue(number: $number) {
      id
      number
      url
      state
    }
  }
}

# ListRepoIssuesWithLabels lists open Issues with their label set, used for
# triage filtering.
query ListRepoIssuesWithLabels($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    issues(first: $first, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
        url
        updatedAt
        labels(first: 20) {
          nodes {
            name
          }
        }
      }
    }
  }
}

# ListClosedIssues lists recently CLOSED Issues; the caller filters by
# closedAt window.
query ListClosedIssues($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    issues(first: $first, states: CLOSED, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
        url
        closedAt
        author {
          login
        }
        assignees(first: 10) {
          nodes {
            login
          }
        }
      }
    }
  }
}

# ===== Repository read operations ===========================================

# GetRepositoryID resolves a repository's node id.
query GetRepositoryID($owner: String!, $name: String!) {
  repository(owner: $owner, name: $name) {
    id
  }
}

# ===== Viewer / owner read operations =======================================

# GetViewerID resolves the viewer's node id (used for `--owner @me`).
query GetViewerID {
  viewer {
    id
    login
  }
}

# GetOwnerID resolves a user/org's node id from a login.
query GetOwnerID($login: String!) {
  repositoryOwner(login: $login) {
    __typename
    id
    login
  }
}

# ===== Pull request read operations =========================================

# GetPullRequestByNumber resolves a PR's id and current body.
query GetPullRequestByNumber($owner: String!, $name: String!, $number: Int!) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      id
      number
      url
      body
    }
  }
}

# ListMergedPRs lists recently MERGED PRs; the caller filters by mergedAt.
query ListMergedPRs($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    pullRequests(first: $first, states: MERGED, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
        url
        mergedAt
        author {
          login
        }
        assignees(first: 10) {
          nodes {
            login
          }
        }
      }
    }
  }
}

# ===== Milestone read operations ============================================

# ListRepoIssuesWithMilestone lists open Issues with their milestone binding.
query ListRepoIssuesWithMilestone($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    issues(first: $first, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
        url
        updatedAt
        milestone {
          id
          number
          title
        }
      }
    }
  }
}

# ListMilestones lists recently updated open milestones.
query ListMilestones($owner: String!, $name: String!, $first: Int!) {
  repository(owner: $owner, name: $name) {
    milestones(first: $first, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
      nodes {
        id
        number
        title
      }
    }
  }
}

# ===== ProjectV2 read operations ============================================

# GetUserProjectV2 resolves a user-scope Projects v2 node by login + number.
query GetUserProjectV2($login: String!, $number: Int!) {
  user(login: $login) {
    projectV2(number: $number) {
      id
      number
      title
    }
  }
}

# GetOrgProjectV2 resolves an org-scope Projects v2 node by login + number.
query GetOrgProjectV2($login: String!, $number: Int!) {
  organization(login: $login) {
    projectV2(number: $number) {
      id
      number
      title
    }
  }
}

# ListProjectV2Fields lists fields with their per-type extras (single-select
# options, iteration configurations). Response goes through the `node(id:
# ID!)` Node interface; the inline fragment restricts genqlient's expansion
# to ProjectV2, and @genqlient(typename: ...) directives keep generated Go
# type names tractable for the cmd/* call sites.

query ListProjectV2Fields($projectId: ID!, $first: Int!) {
  # @genqlient(typename: "ProjectV2FieldsNode")
  node(id: $projectId) {
    ... on ProjectV2 {
      fields(first: $first) {
        # @genqlient(typename: "ProjectV2FieldNode")
        nodes {
          __typename
          ... on ProjectV2FieldCommon {
            id
            name
            dataType
          }
          ... on ProjectV2SingleSelectField {
            options {
              id
              name
            }
          }
          ... on ProjectV2IterationField {
            # @genqlient(typename: "ProjectV2IterationConfig")
            configuration {
              # @genqlient(typename: "ProjectV2IterationOption")
              iterations {
                id
                title
                startDate
                duration
              }
              # @genqlient(typename: "ProjectV2IterationOption")
              completedIterations {
                id
                title
                startDate
                duration
              }
            }
          }
        }
      }
    }
  }
}

# ListProjectV2Items lists items in a Projects v2 board. Like
# ListProjectV2Fields, response goes through node(id: ID!) and
# @genqlient(typename: ...) directives keep generated type names tractable.
#
# Issue.state and PullRequest.state are aliased separately because their
# enum types differ (IssueState vs PullRequestState); reusing the same
# selection name would be a GraphQL type conflict.

query ListProjectV2Items($projectId: ID!, $first: Int!) {
  # @genqlient(typename: "ProjectV2ItemsNode")
  node(id: $projectId) {
    ... on ProjectV2 {
      items(first: $first) {
        # @genqlient(typename: "ProjectV2ItemNode")
        nodes {
          id
          updatedAt
          # @genqlient(typename: "ProjectV2ItemContent")
          content {
            __typename
            ... on Issue {
              id
              number
              title
              url
              issueState: state
              updatedAt
              closedAt
              # @genqlient(typename: "ProjectV2ItemContentLogin")
              author {
                login
              }
              # @genqlient(typename: "ProjectV2ItemContentAssignees")
              assignees(first: 10) {
                # @genqlient(typename: "ProjectV2ItemContentAssigneeLogin")
                nodes {
                  login
                }
              }
            }
            ... on PullRequest {
              id
              number
              title
              url
              prState: state
              updatedAt
              mergedAt
              # @genqlient(typename: "ProjectV2ItemContentLogin")
              author {
                login
              }
              # @genqlient(typename: "ProjectV2ItemContentAssignees")
              assignees(first: 10) {
                # @genqlient(typename: "ProjectV2ItemContentAssigneeLogin")
                nodes {
                  login
                }
              }
            }
            ... on DraftIssue {
              id
              title
              body
            }
          }
          fieldValues(first: 30) {
            # @genqlient(typename: "ProjectV2ItemFieldValue")
            nodes {
              __typename
              ... on ProjectV2ItemFieldSingleSelectValue {
                optionId
                name
                # @genqlient(typename: "ProjectV2ItemFieldValueFieldRef")
                field {
                  ... on ProjectV2FieldCommon {
                    id
                    name
                  }
                }
              }
              ... on ProjectV2ItemFieldIterationValue {
                iterationId
                title
                startDate
                duration
                # @genqlient(typename: "ProjectV2ItemFieldValueFieldRef")
                field {
                  ... on ProjectV2FieldCommon {
                    id
                    name
                  }
                }
              }
              ... on ProjectV2ItemFieldTextValue {
                text
                # @genqlient(typename: "ProjectV2ItemFieldValueFieldRef")
                field {
                  ... on ProjectV2FieldCommon {
                    id
                    name
                  }
                }
              }
              ... on ProjectV2ItemFieldDateValue {
                date
                # @genqlient(typename: "ProjectV2ItemFieldValueFieldRef")
                field {
                  ... on ProjectV2FieldCommon {
                    id
                    name
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
# ===== Issue mutations ======================================================

# CreateIssue mutates a new Issue under a given repository.
mutation CreateIssue($input: CreateIssueInput!) {
  createIssue(input: $input) {
    issue {
      id
      number
      url
    }
  }
}

# CloseIssue mutates an Issue to state CLOSED.
mutation CloseIssue($input: CloseIssueInput!) {
  closeIssue(input: $input) {
    issue {
      id
      number
      url
      state
    }
  }
}

# UpdateIssueMilestone binds (or clears) a milestone on an Issue.
mutation UpdateIssueMilestone($input: UpdateIssueInput!) {
  updateIssue(input: $input) {
    issue {
      id
      number
      url
      milestone {
        id
        number
        title
      }
    }
  }
}

# ===== Pull request mutations ===============================================

# UpdatePullRequest mutates a PR's body.
mutation UpdatePullRequest($input: UpdatePullRequestInput!) {
  updatePullRequest(input: $input) {
    pullRequest {
      id
      number
      url
    }
  }
}

# ===== Project mutations ====================================================

# AddProjectV2DraftIssue adds a draft item to a Projects v2 board.
mutation AddProjectV2DraftIssue($input: AddProjectV2DraftIssueInput!) {
  addProjectV2DraftIssue(input: $input) {
    projectItem {
      id
    }
  }
}

# AddProjectV2ItemById adds an existing Issue or PR to a Projects v2 board.
mutation AddProjectV2ItemById($input: AddProjectV2ItemByIdInput!) {
  addProjectV2ItemById(input: $input) {
    item {
      id
    }
  }
}

# UpdateProjectV2ItemFieldValue updates a single field value on a project
# item. The value shape is constructed by the caller per the target field's
# dataType.
mutation UpdateProjectV2ItemFieldValue($input: UpdateProjectV2ItemFieldValueInput!) {
  updateProjectV2ItemFieldValue(input: $input) {
    projectV2Item {
      id
    }
  }
}

# CreateProjectV2 creates a Projects v2 board owned by ownerId.
mutation CreateProjectV2($input: CreateProjectV2Input!) {
  createProjectV2(input: $input) {
    projectV2 {
      id
      number
      title
      url
    }
  }
}

# CreateProjectV2Field adds a custom field to an existing Projects v2 board.
mutation CreateProjectV2Field($input: CreateProjectV2FieldInput!) {
  createProjectV2Field(input: $input) {
    projectV2Field {
      ... on ProjectV2FieldCommon {
        id
        name
        dataType
      }
    }
  }
}
