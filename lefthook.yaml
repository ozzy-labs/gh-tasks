extends:
  - lefthook-base.yaml

commit-msg:
  commands:
    commitlint:
      run: npx --yes @commitlint/cli --edit {1}

pre-commit:
  parallel: true
  commands:
    check-yaml-extension:
      glob: '**/*.yml'
      # Reject `.yml` to enforce the `.yaml` convention. Some upstream
      # tools / vendored manifests force `.yml` (e.g. action.yml from
      # third-party reusable workflows); list those here as needed.
      exclude:
        - 'node_modules/**'
        - '**/node_modules/**'
      run: 'echo "❌ .yml files found. Use .yaml extension instead." && exit 1'
    # golangci-lint v2 has gofumpt / goimports / gci in its `formatters`
    # block (.golangci.yaml), so `golangci-lint run --fix` already applies
    # the same rewrites as a standalone `gofumpt -w` would. Running both
    # in parallel previously raced — each step started from the unmodified
    # file content, and whichever finished last clobbered the other's
    # output. Trust golangci-lint as the single Go formatter.
    golangci-lint:
      glob: '**/*.go'
      run: mise exec -- golangci-lint run --fix --timeout 5m
      stage_fixed: true
    check-no-hardcoded-i18n-go:
      glob: '{cmd,internal}/**/*.go'
      run: mise exec -- go run . check-i18n
    markdownlint:
      glob: '*.md'
      exclude:
        - 'node_modules/**'
        - '**/node_modules/**'
        - '**/CHANGELOG.md'
      run: markdownlint-cli2 {staged_files}
    yamlfmt:
      glob: '*.yaml'
      run: yamlfmt {staged_files}
      stage_fixed: true
    yamllint:
      glob: '*.yaml'
      run: yamllint {staged_files}
    shellcheck:
      glob: '*.sh'
      run: shellcheck {staged_files}
    shfmt:
      glob: '*.sh'
      run: shfmt -w {staged_files}
      stage_fixed: true
    actionlint:
      glob: '.github/workflows/*.yaml'
      run: actionlint
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact
    trivy:
      run: |
        if ! command -v trivy >/dev/null 2>&1; then
          echo "trivy not installed; skipping (install via brew/apt or your local mise)" >&2
          exit 0
        fi
        trivy fs --scanners vuln --exit-code 1 --no-progress .

pre-push:
  commands:
    go-test:
      run: mise exec -- go test ./...
    check-branch-name:
      run: |-
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" = "main" ]; then exit 0; fi
        echo "$BRANCH" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/.+' || {
          echo "❌ Invalid branch name: $BRANCH"
          echo "Expected format: <type>/<description>"
          exit 1
        }
